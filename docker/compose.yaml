# Montage — Local PostgreSQL
services:
  postgres:
    image: postgres:17-alpine
    container_name: montage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: montage
      POSTGRES_USER: authenticator
      POSTGRES_PASSWORD: montage_local_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authenticator -d montage"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local
    driver_opts:
      device: /root/montage/data/pgdata
      o: bind
      type: none
